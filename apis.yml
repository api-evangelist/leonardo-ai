aid: leonardo-ai
url: https://raw.githubusercontent.com/api-evangelist/leonardo-ai/refs/heads/main/apis.yml
name: Leonardo.AI
description: Leonardo.AI is an Australian generative-AI company (acquired by Canva in July 2024) offering a
  Production API for AI image generation, video generation, 3D model creation, custom model and element training,
  realtime canvas editing, upscaling and variations, and Blueprint workflow execution. The platform supports
  in-house Leonardo models (Phoenix, Lucid Origin, Lucid Realism) and third-party models (FLUX.1/FLUX.2, Ideogram
  3.0, GPT Image, Nano Banana, Seedream, Kling, LTX, Veo, Seedance, Hailuo, Rodin) under a unified pay-as-you-go
  dollar-denominated API surface with webhook callbacks, MCP server integration, and official Python and
  TypeScript SDKs.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
kind: contract
access: 3rd-Party
