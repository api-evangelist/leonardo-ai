apis:
- aid: leonardo-ai:leonardo-ai-image-generation
  name: Leonardo.AI Image Generation API
  description: Create image generations with FLUX.2 Pro, FLUX Dev, FLUX Schnell, FLUX.1 Kontext, Phoenix,
    Lucid Origin, Lucid Realism, Ideogram 3.0, GPT Image 2, Nano Banana, Seedream, and other supported models.
    POST /generations submits a job; results are retrieved via GET /generations/{id} or via the optional
    webhook callback. Supports PhotoReal, Alchemy, image prompts, image guidance (ControlNet), enhanced prompts,
    transparency, and per-model knobs.
  humanURL: https://docs.leonardo.ai/reference/creategeneration
  tags:
  - AI
  - Image Generation
  - Generations
