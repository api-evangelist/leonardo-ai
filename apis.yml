  description: Generate videos from text or images via Kling 2.x/3.x, LTX 2.x, Veo 3.x, Seedance, Hailuo, and
    Stable Video Diffusion motion models. Three endpoints cover image-to-video, text-to-video, and SVD motion.
    Jobs are asynchronous; poll the variation/motion endpoints or use a webhook for completion.
  humanURL: https://docs.leonardo.ai/reference/createimagetovideogeneration
