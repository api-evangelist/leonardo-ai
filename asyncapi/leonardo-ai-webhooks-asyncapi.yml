  schemas:
    ImageGenerationCompleteEnvelope:
      type: object
      description: |-
        Top-level event envelope delivered for `image_generation.complete`.
        Field set is taken verbatim from the public Leonardo webhook callback
        guide.
      required:
        - type
        - object
        - timestamp
        - api_version
        - data
      properties:
        type:
          type: string
          description: Event class. Documented value is `image_generation.complete`.
          enum:
            - image_generation.complete
        object:
          type: string
          description: Resource class carried in `data.object`.
          enum:
            - generation
        timestamp:
          type: integer
          format: int64
          description: Unix epoch time in milliseconds.
          example: 1699490546932
        api_version:
          type: string
          description: Webhook envelope version.
          enum:
            - v1
        data:
          type: object
          required:
            - object
          properties:
            object:
              $ref: '#/components/schemas/Generation'

    Generation:
      type: object
      description: |-
        Generation resource as delivered inside `data.object` for an
        `image_generation.complete` event. Field names and example values
        mirror the public guide exactly; types are inferred from the sample
        payload.
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        public:
          type: boolean
        flagged:
          type: boolean
        nsfw:
          type: boolean
        status:
          type: string
          description: Terminal status for the generation.
          example: COMPLETE
        coreModel:
          type: string
          example: SD
        guidanceScale:
          type: number
        imageHeight:
          type: integer
        imageWidth:
          type: integer
        inferenceSteps:
          type: integer
        initGeneratedImageId:
          type: string
          nullable: true
        initImageId:
          type: string
          nullable: true
        initStrength:
          type: number
          nullable: true
        initType:
          type: string
          nullable: true
        initUpscaledImageId:
          type: string
          nullable: true
        modelId:
          type: string
          format: uuid
          nullable: true
        negativePrompt:
          type: string
        prompt:
          type: string
        quantity:
          type: integer
        sdVersion:
          type: string
        tiling:
          type: boolean
        imageAspectRatio:
          type: string
          nullable: true
        tokenCost:
          type: number
        negativeStylePrompt:
          type: string
        seed:
          type: string
        scheduler:
          type: string
        presetStyle:
          type: string
          nullable: true
        promptMagic:
          type: boolean
          nullable: true
        canvasInitImageId:
          type: string
          nullable: true
        canvasMaskImageId:
          type: string
          nullable: true
        canvasRequest:
          type: boolean
        api:
          type: boolean
        poseImage2Image:
          type: boolean
        imagePromptStrength:
          type: number
          nullable: true
        category:
          type: string
          nullable: true
        poseImage2ImageType:
          type: string
          nullable: true
        highContrast:
          type: boolean
          nullable: true
        apiDollarCost:
          type: string
          description: |-
            USD cost of the generation expressed as a string to preserve
            decimal precision, mirroring the sample payload.
        poseImage2ImageWeight:
          type: number
          nullable: true
        alchemy:
          type: boolean
          nullable: true
        contrastRatio:
          type: number
          nullable: true
        highResolution:
          type: boolean
          nullable: true
        expandedDomain:
          type: boolean
          nullable: true
        promptMagicVersion:
          type: string
          nullable: true
        unzoom:
          type: boolean
          nullable: true
        unzoomAmount:
          type: number
          nullable: true
        apiKeyId:
          type: string
          format: uuid
        photoReal:
          type: boolean
        promptMagicStrength:
          type: number
          nullable: true
        photoRealStrength:
          type: number
          nullable: true
        imageToImage:
          type: boolean
        controlnetsUsed:
