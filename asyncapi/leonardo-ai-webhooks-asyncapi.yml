          nullable: true

    GeneratedImage:
      type: object
      description: |-
        Image asset produced by the generation. The `url` points to the CDN
        location where the rendered image can be fetched.
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        generationId:
          type: string
          format: uuid
        nobgId:
          type: string
          nullable: true
        nsfw:
          type: boolean
        likeCount:
          type: integer
        trendingScore:
          type: number
        public:
          type: boolean

    ApiKey:
      type: object
      description: |-
        Snapshot of the Production API key the generation was billed to,
        including the webhook callback URL and webhook API key that triggered
        this delivery.
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        key:
          type: string
        lastUsed:
          type: string
          format: date-time
        name:
          type: string
        type:
          type: string
          enum:
            - PRODUCTION
        webhookCallbackUrl:
          type: string
          format: uri
        webhookCallbackApiKey:
          type: string
