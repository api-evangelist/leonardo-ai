naftiko: 1.0.0-alpha2
info:
  label: Leonardo.AI Prompt
  description: 'Leonardo.AI Prompt. 2 operations. Lead operation: Generate a Random prompt. Self-contained Naftiko capability
    covering the Leonardo.AI Prompt business surface.'
  tags:
  - Leonardo.AI
  - Prompt
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEONARDO_AI_API_KEY: LEONARDO_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: prompt
    baseUri: https://cloud.leonardo.ai/api/rest/v1
    description: Leonardo.AI Prompt business capability. Self-contained, no shared references.
    resources:
    - name: prompt-random
      path: /prompt/random
      operations:
      - name: prompt-random
        method: POST
        description: This endpoint returns a random prompt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: prompt-improve
      path: /prompt/improve
      operations:
      - name: prompt-improve
        method: POST
        description: This endpoint returns a improved prompt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      value: '{{env.LEONARDO_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: prompt-rest
    port: 8080
    description: REST adapter for Leonardo.AI Prompt. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/prompt/random
      name: prompt-random
      description: REST surface for prompt-random.
      operations:
      - method: POST
        name: prompt-random
        description: This endpoint returns a random prompt
        call: prompt.prompt-random
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/prompt/improve
      name: prompt-improve
      description: REST surface for prompt-improve.
      operations:
      - method: POST
        name: prompt-improve
        description: This endpoint returns a improved prompt
        call: prompt.prompt-improve
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: prompt-mcp
    port: 9090
    transport: http
    description: MCP adapter for Leonardo.AI Prompt. One tool per consumed operation, routed through this capability's consumes
      block.
    tools:
    - name: leonardo-ai-prompt-random
      description: This endpoint returns a random prompt
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: prompt.prompt-random
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: leonardo-ai-prompt-improve
      description: This endpoint returns a improved prompt
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: prompt.prompt-improve
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
