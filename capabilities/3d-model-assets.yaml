naftiko: 1.0.0-alpha2
info:
  label: Leonardo.AI 3D Model Assets
  description: 'Leonardo.AI 3D Model Assets. 4 operations. Lead operation: Upload 3D Model. Self-contained Naftiko capability
    covering the Leonardo.AI 3D Model Assets business surface.'
  tags:
  - Leonardo.AI
  - 3D Model Assets
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEONARDO_AI_API_KEY: LEONARDO_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: models-3d
    baseUri: https://cloud.leonardo.ai/api/rest/v1
    description: Leonardo.AI 3D Model Assets business capability. Self-contained, no shared references.
    resources:
    - name: models-3d-upload
      path: /models-3d/upload
      operations:
      - name: upload-model-asset
        method: POST
        description: This endpoint returns presigned details to upload a 3D model to S3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: models-3d-user-user-id
      path: /models-3d/user/{userId}
      operations:
      - name: get3-dmodels-by-user-id
        method: GET
        description: This endpoint returns all 3D models by a specific user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset
          required: false
        - name: limit
          in: query
          type: integer
          description: limit
          required: false
        - name: userId
          in: path
          type: string
          description: userId
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: models-3d-id
      path: /models-3d/{id}
      operations:
      - name: get3-dmodel-by-id
        method: GET
        description: This endpoint gets the specific 3D model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
          description: offset
          required: false
        - name: limit
          in: query
          type: integer
          description: limit
          required: false
        - name: id
          in: path
          type: string
          description: _"id" is required (enter it either in parameters or request body)_
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: delete3-dmodel-by-id
        method: DELETE
        description: This endpoint deletes the specific 3D Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: _"id" is required (enter it either in parameters or request body)_
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      value: '{{env.LEONARDO_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: models-3d-rest
    port: 8080
    description: REST adapter for Leonardo.AI 3D Model Assets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/models-3d/upload
      name: models-3d-upload
      description: REST surface for models-3d-upload.
      operations:
      - method: POST
        name: upload-model-asset
        description: This endpoint returns presigned details to upload a 3D model to S3
        call: models-3d.upload-model-asset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models-3d/user/{userId}
      name: models-3d-user-user-id
      description: REST surface for models-3d-user-user-id.
      operations:
      - method: GET
        name: get3-dmodels-by-user-id
        description: This endpoint returns all 3D models by a specific user
        call: models-3d.get3-dmodels-by-user-id
        with:
          offset: rest.offset
          limit: rest.limit
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models-3d/{id}
      name: models-3d-id
      description: REST surface for models-3d-id.
      operations:
      - method: GET
        name: get3-dmodel-by-id
        description: This endpoint gets the specific 3D model
        call: models-3d.get3-dmodel-by-id
        with:
          offset: rest.offset
          limit: rest.limit
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete3-dmodel-by-id
        description: This endpoint deletes the specific 3D Model
        call: models-3d.delete3-dmodel-by-id
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: models-3d-mcp
    port: 9090
    transport: http
    description: MCP adapter for Leonardo.AI 3D Model Assets. One tool per consumed operation, routed through this capability's
      consumes block.
    tools:
    - name: leonardo-ai-upload-model-asset
      description: This endpoint returns presigned details to upload a 3D model to S3
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: models-3d.upload-model-asset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: leonardo-ai-get3-dmodels-by-user-id
      description: This endpoint returns all 3D models by a specific user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: models-3d.get3-dmodels-by-user-id
      with:
        offset: tools.offset
        limit: tools.limit
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: leonardo-ai-get3-dmodel-by-id
      description: This endpoint gets the specific 3D model
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: models-3d.get3-dmodel-by-id
      with:
        offset: tools.offset
        limit: tools.limit
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: leonardo-ai-delete3-dmodel-by-id
      description: This endpoint deletes the specific 3D Model
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: models-3d.delete3-dmodel-by-id
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
